<!DOCTYPE html>
<html lang="es">

<head>
  <!-- Realizado por: Jean Villegas - Página de contacto -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Jean Villegas">
  <meta name="description"
    content="Página de contacto del sitio La Evolución del HTML. Envía tus consultas o comentarios.">
  <meta name="language" content="Spanish">
  <title>Contacto | La Evolución del HTML</title>
</head>

<body>
  <header class="header">
    <div class="header-contenedor">
      <a href="index.html" class="logo animate-fade-down">
        HTML<span class="logo-destacado">Evolución</span>
      </a>
      <!-- Botón menú desplegable (hamburguesa) -->
      <button class="menu-toggle" id="mobile-menu" type="button" aria-label="Abrir menú de navegación" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav" id="nav-menu">
        <ul class="nav-lista">
          <li><a href="index.html" class="nav-link">Inicio</a></li>
          <li><a href="historia.html" class="nav-link">Historia</a></li>
          <li><a href="caracteristicas.html" class="nav-link">Características</a></li>
          <li><a href="contacto.html" class="nav-link activo">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="contenedor">
    <h1 class="seccion-titulo">Contacto</h1>
    <!-- Texto introductorio de la sección de contacto -->
    <p class="contacto-intro">
      ¿Tienes preguntas sobre la evolución del HTML? Envíanos un mensaje.
    </p>

    <!-- Formulario principal de contacto.
         Los datos se guardan en una base de datos local del navegador usando IndexedDB. -->
    <form class="formulario-contenedor" action="#" method="post" aria-labelledby="form-titulo">
      <h2 id="form-titulo" class="sr-only">Formulario de contacto</h2>
      <div class="form-grupo">
        <label for="nombre">Nombre completo *</label>
        <input type="text" id="nombre" name="nombre" required aria-required="true" placeholder="Ej: Jean Villegas">
      </div>
      <div class="form-grupo">
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" name="email" required aria-required="true" placeholder="tu@email.com">
      </div>
      <div class="form-grupo">
        <label for="mensaje">Mensaje o consulta *</label>
        <textarea id="mensaje" name="mensaje" required aria-required="true"
          placeholder="Escribe aquí tu consulta o comentario..."></textarea>
      </div>
      <button type="submit" class="btn btn-enviar" aria-label="Enviar mensaje de contacto">Enviar Mensaje</button>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-contenedor">
      <p class="footer-texto">&copy; 2025 La Evolución del HTML · Jean Villegas</p>
    </div>
  </footer>
</body>

</html>
